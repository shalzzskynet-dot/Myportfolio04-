<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Shalzz Shooter</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#06030f;font-family:'Rajdhani',sans-serif;color:#e0e0ff;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent}
:root{--v:#7b2fff;--c:#00d4ff;--pk:#ff2d78;--gd:#ffd700;--gr:#00ff88;--or:#ff8c00;--glass:rgba(255,255,255,0.06);--gb:rgba(255,255,255,0.13)}
#bgCv{position:fixed;inset:0;z-index:0;pointer-events:none}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .4s ease,transform .4s ease;z-index:10;pointer-events:all}
.screen.hidden{opacity:0;pointer-events:none;transform:scale(.97)}
@keyframes fsd{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{filter:drop-shadow(0 0 22px rgba(123,47,255,.7))}50%{filter:drop-shadow(0 0 44px rgba(0,212,255,1))drop-shadow(0 0 22px rgba(255,45,120,.5))}}
@keyframes float{0%,100%{transform:translate(-50%,-52%)}50%{transform:translate(-50%,-46%)}}
@keyframes ring{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.2;transform:scale(1.1)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes comboPop{0%{opacity:0;transform:scale(.4) translateY(0)}20%{opacity:1;transform:scale(1.25) translateY(-8px)}80%{opacity:1;transform:scale(1) translateY(-38px)}100%{opacity:0;transform:scale(.8) translateY(-56px)}}
/* LANDING */
#landingScreen{gap:0}
.logo-eye{font-size:11px;letter-spacing:6px;color:var(--c);opacity:.75;text-transform:uppercase;margin-bottom:6px;text-align:center;animation:fsd .7s ease both}
.logo-ttl{font-family:'Orbitron',monospace;font-size:clamp(30px,9vw,76px);font-weight:900;line-height:1;background:linear-gradient(135deg,var(--v) 0%,var(--c) 50%,var(--pk) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 22px rgba(123,47,255,.7));animation:fsd .7s .08s ease both,pulse 3.5s 1s infinite;text-align:center}
.logo-sub{font-size:clamp(11px,3vw,16px);font-weight:300;letter-spacing:4px;color:rgba(224,224,255,.48);margin-top:6px;text-align:center;animation:fsd .7s .16s ease both}
.orb-wrap{width:100px;height:100px;margin:16px auto 20px;position:relative;animation:fsd .7s .24s ease both}
.orb{width:52px;height:52px;border-radius:50%;background:radial-gradient(circle at 35% 35%,rgba(255,255,255,.45),var(--v));box-shadow:0 0 26px rgba(123,47,255,.85);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);animation:float 3s ease-in-out infinite}
.orb-ring{position:absolute;inset:0;border-radius:50%;border:1px solid rgba(123,47,255,.35);animation:ring 2s ease-in-out infinite}
.orb-ring:nth-child(2){animation-delay:.5s;inset:-12px;border-color:rgba(0,212,255,.28)}
.orb-ring:nth-child(3){animation-delay:1s;inset:-24px;border-color:rgba(255,45,120,.18)}
.menu-btns{display:flex;flex-direction:column;gap:11px;width:min(270px,86vw);animation:fsd .7s .32s ease both}
/* BUTTONS */
.btn{padding:13px 22px;border:none;border-radius:11px;font-family:'Orbitron',monospace;font-size:12px;font-weight:700;letter-spacing:2px;cursor:pointer;position:relative;overflow:hidden;transition:transform .15s ease,box-shadow .15s ease;text-transform:uppercase;-webkit-appearance:none}
.btn::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,.1);opacity:0;transition:opacity .2s}
.btn:hover::after{opacity:1}
.btn:active{transform:scale(.95)!important}
.btn-p{background:linear-gradient(135deg,var(--v),#4400bb);color:#fff;box-shadow:0 4px 20px rgba(123,47,255,.5),inset 0 1px 0 rgba(255,255,255,.18)}
.btn-p:hover{transform:translateY(-2px);box-shadow:0 7px 28px rgba(123,47,255,.7)}
.btn-s{background:var(--glass);border:1px solid var(--gb);color:var(--c);backdrop-filter:blur(12px)}
.btn-s:hover{transform:translateY(-2px);border-color:var(--c);box-shadow:0 4px 20px rgba(0,212,255,.3)}
.btn-g{background:transparent;border:1px solid rgba(255,45,120,.4);color:var(--pk)}
.btn-g:hover{border-color:var(--pk);box-shadow:0 0 16px rgba(255,45,120,.3);transform:translateY(-2px)}
/* HUD */
#gameScreen{z-index:10}
.hud{position:fixed;top:0;left:0;right:0;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(to bottom,rgba(6,3,15,.96),transparent);z-index:20;gap:8px}
.hud-blk{display:flex;flex-direction:column;align-items:center;min-width:64px}
.hud-lbl{font-size:9px;letter-spacing:3px;color:rgba(224,224,255,.42);text-transform:uppercase}
.hud-val{font-family:'Orbitron',monospace;font-size:18px;font-weight:700;color:#fff;line-height:1;text-shadow:0 0 10px rgba(0,212,255,.5)}
.hud-val.gold{color:var(--gd);text-shadow:0 0 10px rgba(255,215,0,.5)}
.hud-mid{display:flex;flex-direction:column;align-items:center;gap:4px}
.lvl-badge{font-family:'Orbitron',monospace;font-size:10px;font-weight:700;letter-spacing:3px;color:var(--c);background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.3);border-radius:20px;padding:3px 11px}
.hud-ctrl{display:flex;gap:7px;align-items:center}
.ic-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--gb);background:var(--glass);backdrop-filter:blur(8px);color:rgba(224,224,255,.85);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s;-webkit-tap-highlight-color:transparent}
.ic-btn:hover{border-color:var(--v);color:#fff;box-shadow:0 0 10px rgba(123,47,255,.5)}
.ic-btn:active{transform:scale(.88)}
#gameCv{display:block;touch-action:none;cursor:crosshair}
.prog-bar{position:fixed;top:56px;left:14px;right:14px;height:3px;background:rgba(255,255,255,.05);border-radius:2px;z-index:20;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--v),var(--c));border-radius:2px;transition:width .4s ease;box-shadow:0 0 7px rgba(0,212,255,.6);width:0%}
/* Tier badge shown in-game */
.tier-badge{position:fixed;top:62px;left:50%;transform:translateX(-50%);font-family:'Orbitron',monospace;font-size:8px;letter-spacing:3px;padding:2px 10px;border-radius:12px;z-index:20;border:1px solid;display:none}
.tier-badge.show{display:block}
.nxt-wrap{position:fixed;bottom:14px;right:14px;display:flex;flex-direction:column;align-items:center;gap:3px;z-index:20}
.nxt-lbl{font-size:9px;letter-spacing:3px;color:rgba(224,224,255,.36);text-transform:uppercase}
.pw-bar{position:fixed;bottom:14px;left:14px;display:flex;flex-direction:column;gap:7px;z-index:20}
.pw-btn{width:42px;height:42px;border-radius:11px;border:1px solid var(--gb);background:var(--glass);backdrop-filter:blur(8px);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s;position:relative;-webkit-tap-highlight-color:transparent}
.pw-btn:hover{border-color:var(--gd);box-shadow:0 0 14px rgba(255,215,0,.4);transform:scale(1.08)}
.pw-btn:active{transform:scale(.92)}
.pw-cnt{position:absolute;top:-5px;right:-5px;width:16px;height:16px;border-radius:50%;background:var(--v);font-size:9px;font-weight:700;font-family:'Orbitron',monospace;color:#fff;display:flex;align-items:center;justify-content:center}
/* OVERLAYS */
.overlay{position:fixed;inset:0;background:rgba(6,3,15,.88);backdrop-filter:blur(14px);display:flex;align-items:center;justify-content:center;z-index:50;transition:opacity .28s ease}
.overlay.hidden{opacity:0;pointer-events:none}
.panel{background:linear-gradient(135deg,rgba(14,6,37,.97),rgba(6,3,15,.97));border:1px solid var(--gb);border-radius:20px;padding:30px 28px;width:min(370px,92vw);text-align:center;box-shadow:0 0 55px rgba(123,47,255,.28);position:relative;overflow:hidden}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--v),var(--c),var(--pk),transparent)}
.ptitle{font-family:'Orbitron',monospace;font-size:clamp(19px,5vw,30px);font-weight:900;margin-bottom:6px}
.ptitle.go{background:linear-gradient(135deg,var(--pk),var(--v));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ptitle.lc{background:linear-gradient(135deg,var(--gd),var(--c));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ptitle.pa{color:var(--c)}
.ptitle.boss{background:linear-gradient(135deg,#ff4400,#ff0000);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.psub{color:rgba(224,224,255,.46);font-size:12px;letter-spacing:3px;margin-bottom:22px}
.sbox{background:rgba(0,0,0,.28);border:1px solid var(--gb);border-radius:12px;padding:14px;margin-bottom:18px}
.srow{display:flex;justify-content:space-between;align-items:center;padding:6px 0}
.srow:not(:last-child){border-bottom:1px solid rgba(255,255,255,.05)}
.srow-l{color:rgba(224,224,255,.46);font-size:11px;letter-spacing:2px}
.srow-v{font-family:'Orbitron',monospace;font-size:15px;font-weight:700;color:#fff}
.srow-v.hi{color:var(--gd)}
.srow-v.danger{color:var(--pk)}
.panel-btns{display:flex;flex-direction:column;gap:9px}
/* LEVELS SCREEN */
#levelsScreen{overflow-y:auto;-webkit-overflow-scrolling:touch;justify-content:flex-start;padding:70px 14px 30px}
.back-btn{position:fixed;top:12px;left:12px;z-index:30}
.pg-title{font-family:'Orbitron',monospace;font-size:clamp(17px,5vw,28px);font-weight:900;background:linear-gradient(135deg,var(--c),var(--v));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;margin-bottom:4px}
.pg-sub{color:rgba(224,224,255,.36);font-size:11px;letter-spacing:3px;text-align:center;margin-bottom:18px}
/* Tier sections */
.tier-section{width:min(500px,96vw);margin-bottom:18px}
.tier-header{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:10px;margin-bottom:10px;border:1px solid}
.tier-header-icon{font-size:18px}
.tier-header-info{display:flex;flex-direction:column}
.tier-header-name{font-family:'Orbitron',monospace;font-size:11px;font-weight:900;letter-spacing:3px}
.tier-header-desc{font-size:10px;color:rgba(224,224,255,.5);letter-spacing:1px;margin-top:1px}
.lvls-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(58px,1fr));gap:8px}
.ltile{aspect-ratio:1;border-radius:10px;border:1px solid var(--gb);background:var(--glass);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .16s;position:relative}
.ltile:hover{transform:scale(1.08)}
.ltile.locked{opacity:.25;cursor:not-allowed}
.ltile.locked:hover{transform:none}
.ltile.done{border-color:var(--gr)!important;background:rgba(0,255,136,.07)}
.ltile.boss-tile{border-color:rgba(255,68,0,.5)!important;background:rgba(255,68,0,.07)}
.ltile.boss-tile .tnum{color:#ff4400}
.tnum{font-family:'Orbitron',monospace;font-size:13px;font-weight:900;color:#fff}
.tstars{font-size:8px;margin-top:1px}
.boss-crown{position:absolute;top:-6px;left:50%;transform:translateX(-50%);font-size:10px}
/* SETTINGS */
#settingsScreen{z-index:10}
.spanel{background:linear-gradient(135deg,rgba(14,6,37,.97),rgba(6,3,15,.97));border:1px solid var(--gb);border-radius:20px;padding:30px 28px;width:min(360px,92vw);position:relative;overflow:hidden}
.spanel::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--c),var(--v),transparent)}
.stitle{font-family:'Orbitron',monospace;font-size:19px;font-weight:900;color:var(--c);text-align:center;margin-bottom:22px}
.srow2{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.slbl{font-size:13px;font-weight:600;letter-spacing:1px}
.tog{width:46px;height:24px;border-radius:12px;background:rgba(255,255,255,.1);border:1px solid var(--gb);cursor:pointer;position:relative;transition:background .28s ease}
.tog.on{background:var(--v);border-color:var(--v)}
.tog::after{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;top:2px;left:2px;transition:transform .28s ease;box-shadow:0 2px 5px rgba(0,0,0,.28)}
.tog.on::after{transform:translateX(22px)}
.tpills{display:flex;gap:7px;flex-wrap:wrap;margin-top:11px}
.tpill{padding:7px 14px;border-radius:20px;border:1px solid var(--gb);background:var(--glass);cursor:pointer;font-size:12px;transition:all .18s;font-family:'Rajdhani',sans-serif;font-weight:600}
.tpill.active{border-color:var(--v);background:rgba(123,47,255,.2);box-shadow:0 0 12px rgba(123,47,255,.4)}
/* COMBO */
.combo-pop{position:fixed;font-family:'Orbitron',monospace;font-size:28px;font-weight:900;color:var(--gd);text-shadow:0 0 18px rgba(255,215,0,.85);pointer-events:none;z-index:100;animation:comboPop 1.1s ease forwards;white-space:nowrap}
/* PROFILE */
#profileScreen{overflow-y:auto;overflow-x:hidden;justify-content:flex-start;-webkit-overflow-scrolling:touch}
.prof-hero{width:100%;min-height:250px;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:26px;overflow:hidden;flex-shrink:0}
.prof-hero-bg{position:absolute;inset:0;background:linear-gradient(160deg,#1a0040 0%,#06030f 55%,#001a3a 100%)}
.prof-hero-bg::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(123,47,255,.03) 3px,rgba(123,47,255,.03) 4px)}
.prof-hero::before{content:'';position:absolute;top:14px;left:14px;width:36px;height:36px;border-top:2px solid var(--c);border-left:2px solid var(--c);z-index:2;opacity:.6}
.prof-hero::after{content:'';position:absolute;top:14px;right:14px;width:36px;height:36px;border-top:2px solid var(--pk);border-right:2px solid var(--pk);z-index:2;opacity:.6}
.av-wrap{position:relative;z-index:3;margin-bottom:14px;animation:fsd .8s cubic-bezier(.34,1.56,.64,1) both}
.av-img{width:108px;height:108px;border-radius:50%;display:block;object-fit:cover;object-position:center top;border:3px solid rgba(123,47,255,.7);box-shadow:0 0 0 5px rgba(0,212,255,.15),0 0 36px rgba(123,47,255,.75),0 0 70px rgba(0,212,255,.28)}
.av-ring{position:absolute;inset:-10px;border-radius:50%;border:1.5px solid rgba(0,212,255,.35);animation:spin 6s linear infinite}
.av-ring::before{content:'';position:absolute;top:-4px;left:50%;transform:translateX(-50%);width:8px;height:8px;border-radius:50%;background:var(--c);box-shadow:0 0 10px var(--c)}
.prof-name-blk{position:relative;z-index:3;text-align:center;animation:fsd .7s .28s ease both}
.prof-name{font-family:'Orbitron',monospace;font-size:clamp(26px,7vw,50px);font-weight:900;background:linear-gradient(135deg,#fff 0%,var(--c) 50%,var(--v) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;letter-spacing:4px}
.prof-role{font-size:12px;letter-spacing:4px;color:rgba(224,224,255,.46);margin-top:6px;text-transform:uppercase}
.prof-tags{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin-top:10px}
.ptag{font-size:10px;letter-spacing:2px;padding:4px 11px;border-radius:20px;border:1px solid;text-transform:uppercase;font-family:'Rajdhani',sans-serif;font-weight:700}
.ptag.v{border-color:var(--v);color:var(--v);background:rgba(123,47,255,.1)}
.ptag.c{border-color:var(--c);color:var(--c);background:rgba(0,212,255,.1)}
.ptag.p{border-color:var(--pk);color:var(--pk);background:rgba(255,45,120,.1)}
.prof-body{width:min(540px,96vw);margin:0 auto;display:flex;flex-direction:column;gap:16px;padding:16px 0 40px;flex-shrink:0}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.stat-cell{background:rgba(0,0,0,.28);border:1px solid var(--gb);border-radius:13px;padding:14px 8px;text-align:center;transition:all .2s}
.stat-cell:hover{border-color:var(--v);box-shadow:0 0 14px rgba(123,47,255,.3)}
.stat-num{font-family:'Orbitron',monospace;font-size:clamp(16px,4vw,24px);font-weight:900;background:linear-gradient(135deg,var(--c),var(--v));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-lbl{font-size:9px;letter-spacing:2px;color:rgba(224,224,255,.38);margin-top:3px;text-transform:uppercase}
.pcard{background:linear-gradient(135deg,rgba(14,6,37,.82),rgba(6,3,15,.9));border:1px solid var(--gb);border-radius:18px;padding:22px;position:relative;overflow:hidden;backdrop-filter:blur(8px)}
.pcard::before{content:'';position:absolute;top:0;left:0;right:0;height:1px}
.pcard.av::before{background:linear-gradient(90deg,transparent,var(--v),transparent)}
.pcard.ac::before{background:linear-gradient(90deg,transparent,var(--c),transparent)}
.pcard.ap::before{background:linear-gradient(90deg,transparent,var(--pk),transparent)}
.pcard.ag::before{background:linear-gradient(90deg,transparent,var(--gd),transparent)}
.p-eye{font-size:10px;letter-spacing:4px;text-transform:uppercase;margin-bottom:9px;font-family:'Rajdhani',sans-serif;font-weight:700}
.p-eye.v{color:var(--v)}.p-eye.c{color:var(--c)}.p-eye.p{color:var(--pk)}.p-eye.g{color:var(--gd)}
.p-head{font-family:'Orbitron',monospace;font-size:clamp(13px,3vw,17px);font-weight:700;margin-bottom:10px;color:#fff}
.p-body{font-size:14px;line-height:1.7;color:rgba(224,224,255,.68)}
.p-body strong{color:#fff;font-weight:600}
.game-quote{border:1px solid rgba(255,45,120,.3);border-radius:10px;padding:12px 16px;margin-top:12px;background:rgba(255,45,120,.05);font-style:italic;color:rgba(224,224,255,.78);font-size:13px;line-height:1.6;position:relative}
.game-quote::before{content:'"';position:absolute;top:-10px;left:12px;font-size:40px;color:var(--pk);opacity:.35;font-family:Georgia,serif;line-height:1}
.skill-list{display:flex;flex-direction:column;gap:13px}
.sk-row{display:flex;flex-direction:column;gap:5px}
.sk-meta{display:flex;justify-content:space-between;align-items:center}
.sk-name{font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(224,224,255,.82)}
.sk-pct{font-family:'Orbitron',monospace;font-size:10px;color:rgba(224,224,255,.38)}
.sk-track{height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.sk-fill{height:100%;border-radius:3px;width:0%;transition:width 1.2s cubic-bezier(.16,1,.3,1)}
.sf-v{background:linear-gradient(90deg,var(--v),#b066ff);box-shadow:0 0 7px rgba(123,47,255,.6)}
.sf-c{background:linear-gradient(90deg,#0088cc,var(--c));box-shadow:0 0 7px rgba(0,212,255,.6)}
.sf-p{background:linear-gradient(90deg,#cc0044,var(--pk));box-shadow:0 0 7px rgba(255,45,120,.6)}
.sf-g{background:linear-gradient(90deg,#cc8800,var(--gd));box-shadow:0 0 7px rgba(255,215,0,.6)}
.sf-gr{background:linear-gradient(90deg,#00aa55,var(--gr));box-shadow:0 0 7px rgba(0,255,136,.6)}
.vision-txt{font-family:'Orbitron',monospace;font-size:clamp(12px,2.8vw,15px);font-weight:700;line-height:1.6;color:rgba(224,224,255,.88);text-align:center;padding:6px 0}
.vision-txt span{color:var(--c)}
.mission-txt{font-family:'Orbitron',monospace;font-size:clamp(12px,2.8vw,15px);font-weight:700;line-height:1.7;color:rgba(224,224,255,.8);text-align:center;padding:4px 0}
.mission-txt em{color:var(--pk);font-style:normal}
.sig-block{background:linear-gradient(135deg,rgba(123,47,255,.08),rgba(0,212,255,.05));border:1px solid rgba(123,47,255,.22);border-radius:18px;padding:26px 22px;text-align:center;position:relative;overflow:hidden}
.sig-block::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center bottom,rgba(123,47,255,.14),transparent 70%);pointer-events:none}
.sig-av{width:68px;height:68px;border-radius:50%;margin:0 auto 12px;border:2px solid rgba(123,47,255,.6);box-shadow:0 0 18px rgba(123,47,255,.5);overflow:hidden;position:relative;z-index:1}
.sig-av img{width:100%;height:100%;object-fit:cover;object-position:center top;borde
